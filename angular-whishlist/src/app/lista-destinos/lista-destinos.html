<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6">
            <span class="anchor" id="formLogin"></span>

            <div class="card border-secondary">
                <div class="card-header">
                    <h3 class="mb-0">Wishlist</h3>
                </div>

                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Ingresar nombre..."
                                #nombre />
                        </div>

                        <div class="mb-3">
                            <label for="imagenUrl" class="form-label">Imagen URL</label>
                            <input type="text" class="form-control" id="imagenUrl" placeholder="Ingresar url..." #url />
                        </div>

                        <button type="submit" class="btn btn-primary"
                            (click)="guardar(nombre.value, url.value )">Guardar!</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-5" />

    <div class="row row-flex">
        <app-destino-viaje *ngFor="let d of destinos" [destino]="d"></app-destino-viaje>
    </div>
</div>
